services:
  server:
    build:
      context: ./src 
      dockerfile: server.Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DATABASE_URL=mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@rdb:3306/${MYSQL_DATABASE}
      - CHROMA_SERVER_HOST=vdb
      - CHROMA_SERVER_HTTP_PORT=8000
    depends_on:
      rdb:
        condition: service_healthy
      vdb:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  rdb:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 2s
      retries: 5

  vdb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

volumes:
  mysql:
  chroma: